version: 2
updates:
  # Python dependencies via uv (Dependabot reads pyproject.toml + uv.lock natively)
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Kyiv"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      # Group all dev-tooling updates into one PR per week
      dev-tooling:
        patterns:
          - "ruff"
          - "mypy"
          - "pytest*"

  # GitHub Actions — keeps the SHAs we pinned from rotting
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Kyiv"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
      include: "scope"
